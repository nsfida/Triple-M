<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Efficient Hex Cluster Splitter</title>

<style>
  body {
    font-family: Arial, sans-serif;
    font-size: 10px;
    background: #f4f4f4;
    padding: 8px;
  }

  input, button {
    font-size: 10px;
    padding: 4px;
    margin: 3px 0;
    width: 100%;
    box-sizing: border-box;
  }

  button {
    cursor: pointer;
  }

  .box {
    background: white;
    padding: 5px;
    margin: 5px 0;
    border: 1px solid #ccc;
  }

  .row {
    background: white;
    border-bottom: 1px solid #ddd;
    padding: 3px;
    font-size: 9px;
    word-break: break-all;
    line-height: 1.3;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
  }

  .mono {
    font-family: Consolas, monospace;
  }

  .label {
    color: #666;
  }
</style>
</head>

<body>

<h3>Efficient Hex Range Cluster Splitter</h3>

<div class="box">
  <label>Hex 1 Start</label>
  <input id="hex1" class="mono" value="0000000000000000000000000000004000000000000000000000000000000000">

  <label>Hex 2 End</label>
  <input id="hex2" class="mono" value="0000000000000000000000000000007fffffffffffffffffffffffffffffffff">

  <button onclick="build()">Build Clusters</button>
</div>

<div id="summary" class="box"></div>

<div class="box">
  <div class="controls">
    <button onclick="prevPage()">Previous</button>
    <button onclick="nextPage()">Next</button>
    <button onclick="goToPage()">Go Page</button>
  </div>

  <input id="pageInput" placeholder="Enter page number">
</div>

<div id="output"></div>

<script>
let start = 0n;
let end = 0n;
let clusterSize = 17590000000000n; // 1.759 × 10^13
let totalSpace = 0n;
let totalClusters = 0n;
let currentPage = 1n;
let rowsPerPage = 50n;
let hexLength = 64;

function cleanHex(hex) {
  return hex.trim().replace(/^0x/i, "");
}

function padHex(hex) {
  return hex.padStart(hexLength, "0");
}

function formatBig(n) {
  return n.toString();
}

function build() {
  const h1 = cleanHex(document.getElementById("hex1").value);
  const h2 = cleanHex(document.getElementById("hex2").value);

  if (!h1 || !h2) {
    alert("Enter both hex values.");
    return;
  }

  if (!/^[0-9a-fA-F]+$/.test(h1) || !/^[0-9a-fA-F]+$/.test(h2)) {
    alert("Invalid hex.");
    return;
  }

  start = BigInt("0x" + h1);
  end = BigInt("0x" + h2);

  if (start > end) {
    alert("Hex 1 must be smaller than Hex 2.");
    return;
  }

  hexLength = Math.max(h1.length, h2.length);

  totalSpace = end - start + 1n;
  totalClusters = (totalSpace + clusterSize - 1n) / clusterSize;
  currentPage = 1n;

  showSummary();
  renderPage();
}

function showSummary() {
  const totalPages = (totalClusters + rowsPerPage - 1n) / rowsPerPage;

  document.getElementById("summary").innerHTML = `
    <div><b>Total Space:</b> ${formatBig(totalSpace)}</div>
    <div><b>Cluster Size:</b> ${formatBig(clusterSize)}</div>
    <div><b>Total Clusters:</b> ${formatBig(totalClusters)}</div>
    <div><b>Total Pages:</b> ${formatBig(totalPages)}</div>
    <div><b>Current Page:</b> ${formatBig(currentPage)}</div>
  `;
}

function renderPage() {
  const output = document.getElementById("output");
  output.innerHTML = "";

  const firstClusterIndex = (currentPage - 1n) * rowsPerPage;
  let lastClusterIndex = firstClusterIndex + rowsPerPage - 1n;

  if (lastClusterIndex >= totalClusters) {
    lastClusterIndex = totalClusters - 1n;
  }

  let html = "";

  for (let i = firstClusterIndex; i <= lastClusterIndex; i++) {
    const rangeStart = start + (i * clusterSize);
    let rangeEnd = rangeStart + clusterSize - 1n;

    if (rangeEnd > end) {
      rangeEnd = end;
    }

    const space = rangeEnd - rangeStart + 1n;

    html += `
      <div class="row mono">
        <b>#${(i + 1n).toString()}</b><br>
        <span class="label">Start:</span> ${padHex(rangeStart.toString(16))}<br>
        <span class="label">End:</span> ${padHex(rangeEnd.toString(16))}<br>
        <span class="label">Space:</span> ${space.toString()}
      </div>
    `;
  }

  output.innerHTML = html;
  showSummary();
}

function nextPage() {
  const totalPages = (totalClusters + rowsPerPage - 1n) / rowsPerPage;

  if (currentPage < totalPages) {
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 1n) {
    currentPage--;
    renderPage();
  }
}

function goToPage() {
  const value = document.getElementById("pageInput").value.trim();

  if (!/^[0-9]+$/.test(value)) {
    alert("Enter a valid page number.");
    return;
  }

  const page = BigInt(value);
  const totalPages = (totalClusters + rowsPerPage - 1n) / rowsPerPage;

  if (page < 1n || page > totalPages) {
    alert("Page out of range.");
    return;
  }

  currentPage = page;
  renderPage();
}
</script>

</body>
</html>
