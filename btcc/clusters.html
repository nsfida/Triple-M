<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC HASH160 Range – Clusters</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f5f7fa;color:#101828}
    main{max-width:860px;margin:16px auto;padding:12px}
    h1{margin:0 0 10px;font-size:18px}
    label{display:block;margin:8px 0 4px;font-size:12px;font-weight:700}
    input,select{width:100%;border:1px solid #cfd6e4;border-radius:5px;padding:6px;font:12px/1.25 Consolas,monospace;background:#fff;color:#101828}
    select,input[type="number"]{font-family:Arial,sans-serif}
    button{border:0;border-radius:5px;background:#1457d9;color:#fff;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}
    button.secondary{background:#344054}
    button.danger{background:#b42318}
    button.success{background:#067647}
    button:disabled{background:#98a2b3;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .controls{display:grid;grid-template-columns:80px 130px 1fr;gap:8px;align-items:end}
    .row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
    .count{color:#667085;font-size:11px;margin-top:2px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
    .stat{border:1px solid #dde3ee;border-radius:5px;background:#fff;padding:6px;color:#667085;font-size:11px}
    .stat b{display:block;color:#101828;font-size:13px;margin-top:1px}
    .status{margin:8px 0 0;min-height:17px;font-size:12px;color:#667085}
    .status.ok{color:#067647}
    .status.err{color:#b42318}
    .result{margin-top:10px}

    /* ── Cluster section ── */
    .cluster-section{margin-top:14px}
    .cluster-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
    .cluster-info{font-size:11px;color:#667085;flex:1;min-width:0}
    .cluster-list{max-height:370px;overflow-y:auto;border:1px solid #dde3ee;border-radius:5px;background:#fff}
    .empty-msg{padding:20px;text-align:center;color:#98a2b3;font-size:12px}

    .crow{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid #f0f2f7;font-size:11px}
    .crow:last-child{border-bottom:none}
    .crow.running{background:#eff6ff}
    .crow.found  {background:#f0fdf4}
    .crow.done   {background:#f9fafb}
    .crow.error  {background:#fff7f7}

    .cidx{min-width:30px;color:#98a2b3;font-size:10px;text-align:right;flex-shrink:0}
    .crng{flex:1;font-family:Consolas,monospace;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;color:#344054}
    .cst {min-width:58px;text-align:center;font-size:10px;flex-shrink:0;color:#98a2b3}
    .cst.running{color:#1457d9;font-weight:700}
    .cst.done   {color:#067647}
    .cst.found  {color:#067647;font-weight:700}
    .cst.error  {color:#b42318}
    .cgen{min-width:82px;text-align:right;font-size:10px;color:#667085;font-family:Consolas,monospace;flex-shrink:0}
    .cbtns{display:flex;gap:3px;flex-shrink:0}
    .cbtns button{padding:3px 8px;font-size:10px;font-weight:700}

    @media(max-width:620px){
      .grid,.controls,.stats{grid-template-columns:1fr}
      main{padding:8px}
    }
  </style>
</head>
<body>
<main>
  <h1>BTC HASH160 Range (Compressed) — Cluster Mode</h1>

  <div class="grid">
    <div>
      <label for="startHex">Hex start</label>
      <input id="startHex" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Start hex">
      <div id="startCount" class="count">0 / 64</div>
    </div>
    <div>
      <label for="endHex">Hex end</label>
      <input id="endHex" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="End hex">
      <div id="endCount" class="count">0 / 64</div>
    </div>
  </div>

  <!-- Shared global controls (cores + mode) -->
  <div class="controls">
    <div>
      <label for="coresInput">Cores</label>
      <input id="coresInput" type="number" min="1" max="64" value="1">
    </div>
    <div>
      <label for="modeSelect">Mode</label>
      <select id="modeSelect">
        <option value="sequence">Sequence</option>
        <option value="random">Random</option>
        <option value="reverse">Reverse</option>
      </select>
    </div>
    <div class="row">
      <button id="buildBtn" type="button" class="secondary">Build Clusters</button>
      <button id="clearBtn" type="button" class="secondary">Clear</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">Total Generated<b id="genStat">0</b></div>
    <div class="stat">Speed<b id="spdStat">0 / sec</b></div>
    <div class="stat">Active Clusters<b id="actStat">0</b></div>
    <div class="stat">Total Clusters<b id="totStat">0</b></div>
  </div>

  <p id="statusEl" class="status">Enter a hex range and click Build Clusters.</p>

  <section class="result">
    <label for="targetHash160">Target RIPEMD-160 / HASH160 (auto-stop all on match)</label>
    <input id="targetHash160" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="e.g., f6f5431d25bbf7b12e8add9af5e3475c44a0a5b8">
  </section>

  <section class="result">
    <label for="liveWallet">Live hex | HASH160</label>
    <input id="liveWallet" readonly>
  </section>

  <section id="matchSection" class="result" style="display:none">
    <label>🎉 Match Found — Private Key | HASH160</label>
    <input id="matchOutput" readonly style="background:#f0fdf4;border-color:#86efac;font-weight:700">
  </section>

  <!-- Cluster list -->
  <section class="cluster-section">
    <div class="cluster-header">
      <button id="startAllBtn" type="button" class="success" disabled>▶ Start All</button>
      <button id="stopAllBtn"  type="button" class="danger"  disabled>■ Stop All</button>
      <span id="clusterInfo" class="cluster-info"></span>
    </div>
    <div class="cluster-list" id="clusterList">
      <div class="empty-msg">No clusters yet. Enter a range and click "Build Clusters".</div>
    </div>
  </section>
</main>

<script>
(() => {
  "use strict";

  /* ─── Constants ─────────────────────────────────────────────────────── */
  const SECP256K1_N       = 0xfffffffffffffffffffffffffffffffebaaedce6af48a03bbfd25e8cd0364141n;
  const TARGET_CLUSTER_SZ = 100_000_000_000n;   // 100 billion keys per cluster
  const MAX_CLUSTERS      = 1000;
  const RENDER_CHUNK      = 50;                  // DOM rows per animation frame
  const START_STAGGER_MS  = 15;                  // ms between each cluster launch on Start All
  const defaultCores      = Math.max(1, Math.min(8, navigator.hardwareConcurrency || 1));

  /* ─── DOM ────────────────────────────────────────────────────────────── */
  const $startHex    = document.getElementById("startHex");
  const $endHex      = document.getElementById("endHex");
  const $startCount  = document.getElementById("startCount");
  const $endCount    = document.getElementById("endCount");
  const $coresInput  = document.getElementById("coresInput");
  const $modeSelect  = document.getElementById("modeSelect");
  const $buildBtn    = document.getElementById("buildBtn");
  const $clearBtn    = document.getElementById("clearBtn");
  const $startAllBtn = document.getElementById("startAllBtn");
  const $stopAllBtn  = document.getElementById("stopAllBtn");
  const $statusEl    = document.getElementById("statusEl");
  const $genStat     = document.getElementById("genStat");
  const $spdStat     = document.getElementById("spdStat");
  const $actStat     = document.getElementById("actStat");
  const $totStat     = document.getElementById("totStat");
  const $targetHash  = document.getElementById("targetHash160");
  const $liveWallet  = document.getElementById("liveWallet");
  const $clusterList = document.getElementById("clusterList");
  const $matchSec    = document.getElementById("matchSection");
  const $matchOut    = document.getElementById("matchOutput");
  const $clusterInfo = document.getElementById("clusterInfo");

  $coresInput.value = String(defaultCores);

  /* ─── App state ──────────────────────────────────────────────────────── */
  let clusters    = [];
  let isBuilding  = false;
  let buildToken  = 0;
  let statsTimer  = 0;
  let globalStart = 0;
  let blobUrl     = null;   // shared worker blob URL

  /* ─── Utility ────────────────────────────────────────────────────────── */
  const setStatus = (msg, kind = "") => {
    $statusEl.textContent = msg;
    $statusEl.className = `status ${kind}`.trim();
  };

  const sanitizeHex = v =>
    String(v || "").trim().replace(/^0x/i,"").replace(/\s+/g,"").replace(/[^0-9a-f]/gi,"").toLowerCase();

  function normalizeHex(v, name) {
    const hex = sanitizeHex(v);
    if (!hex) throw new Error(`${name} is required.`);
    if (hex.length > 64) throw new Error(`${name} must be ≤ 64 hex digits.`);
    const padded = hex.padStart(64, "0");
    const num = BigInt("0x" + padded);
    if (num <= 0n || num >= SECP256K1_N) throw new Error(`${name} is outside the valid Bitcoin key range.`);
    return { hex: padded, number: num };
  }

  function normalizeHash160(v) {
    const hex = sanitizeHex(v);
    if (!hex) throw new Error("Target HASH160 is required.");
    if (hex.length !== 40) throw new Error("Target HASH160 must be exactly 40 hex characters.");
    return hex;
  }

  function clampCores(v, rangeSize) {
    let c = Math.max(1, Math.min(64, Math.floor(Number(v)) || 1));
    if (rangeSize <= BigInt(c)) c = Number(rangeSize);
    return Math.max(1, c);
  }

  function shortHex(hex64) {
    const s = hex64.replace(/^0+/, "") || "0";
    return s.length <= 18 ? s : s.slice(0, 9) + "…" + s.slice(-9);
  }

  function updateCounts() {
    const s = sanitizeHex($startHex.value);
    const e = sanitizeHex($endHex.value);
    if (s !== $startHex.value) $startHex.value = s;
    if (e !== $endHex.value)   $endHex.value   = e;
    $startCount.textContent = `${Math.min(s.length,64)} / 64`;
    $endCount.textContent   = `${Math.min(e.length,64)} / 64`;
  }

  function getBlobUrl() {
    if (!blobUrl) blobUrl = URL.createObjectURL(new Blob([workerSrc()], { type: "text/javascript" }));
    return blobUrl;
  }

  /* ─── Stats ──────────────────────────────────────────────────────────── */
  function updateStats() {
    let total = 0, active = 0;
    for (const c of clusters) { total += c.generated; if (c.running) active++; }
    const secs = globalStart ? Math.max(0.001, (performance.now() - globalStart) / 1000) : 0;
    $genStat.textContent = total.toLocaleString();
    $spdStat.textContent = secs > 0 ? Math.round(total / secs).toLocaleString() + " / sec" : "0 / sec";
    $actStat.textContent = String(active);
    $totStat.textContent = String(clusters.length);
    if (!active && statsTimer) { clearInterval(statsTimer); statsTimer = 0; }
  }

  function ensureStatsTimer() {
    if (!globalStart)  globalStart = performance.now();
    if (!statsTimer)   statsTimer  = setInterval(updateStats, 250);
  }

  /* ─── Cluster row DOM ─────────────────────────────────────────────────── */
  function makeRow(c) {
    const row = document.createElement("div");
    row.className = "crow idle";

    const idx = document.createElement("span");
    idx.className = "cidx";
    idx.textContent = "#" + (c.id + 1);

    const s64 = c.startNum.toString(16).padStart(64,"0");
    const e64 = c.endNum.toString(16).padStart(64,"0");
    const rng = document.createElement("span");
    rng.className = "crng";
    rng.textContent = shortHex(s64) + " → " + shortHex(e64);
    rng.title = s64 + " → " + e64;

    const st = document.createElement("span");
    st.className = "cst idle";
    st.textContent = "○ idle";

    const gen = document.createElement("span");
    gen.className = "cgen";

    const btns = document.createElement("div");
    btns.className = "cbtns";

    const sb = document.createElement("button");
    sb.textContent = "Start";
    sb.onclick = () => startCluster(c);

    const xb = document.createElement("button");
    xb.textContent = "Stop";
    xb.className = "danger";
    xb.disabled = true;
    xb.onclick = () => stopOne(c);

    btns.append(sb, xb);
    row.append(idx, rng, st, gen, btns);

    c.el      = row;
    c.elSt    = st;
    c.elGen   = gen;
    c.elStart = sb;
    c.elStop  = xb;
    return row;
  }

  function refreshRow(c) {
    if (!c.el) return;
    c.el.className        = "crow " + c.status;
    c.elSt.className      = "cst "  + c.status;
    c.elSt.textContent    =
      c.status === "running" ? "⚡ run"   :
      c.status === "done"    ? "✓ done"   :
      c.status === "found"   ? "★ match"  :
      c.status === "error"   ? "✗ error"  : "○ idle";
    c.elGen.textContent   = c.generated > 0 ? c.generated.toLocaleString() : "";
    c.elStart.disabled    = c.running || isBuilding;
    c.elStop.disabled     = !c.running;
  }

  /* ─── Cluster control ─────────────────────────────────────────────────── */
  function updateGlobalBtns() {
    const anyRunning = clusters.some(c => c.running);
    const anyStartable = clusters.some(c => !c.running && c.status !== "found");
    $startAllBtn.disabled = isBuilding || clusters.length === 0 || !anyStartable;
    $stopAllBtn.disabled  = !anyRunning;
  }

  function stopOne(c, newStatus = "idle") {
    c.workers.forEach(w => { try { w.terminate(); } catch(_){} });
    c.workers      = [];
    c.running      = false;
    c.status       = newStatus;
    c.workerToken  = null;
    refreshRow(c);
    updateGlobalBtns();
    updateStats();
  }

  function stopAll(newStatus = "idle") {
    for (const c of clusters) if (c.running) stopOne(c, newStatus);
    clearInterval(statsTimer); statsTimer = 0;
    updateStats();
    updateGlobalBtns();
  }

  function startCluster(c) {
    if (c.running) return;

    let target;
    try { target = normalizeHash160($targetHash.value); }
    catch(e) { setStatus(e.message, "err"); return; }

    const rangeSize = c.endNum - c.startNum + 1n;
    const cores  = clampCores($coresInput.value, rangeSize);
    const mode   = $modeSelect.value;
    const wToken = Symbol();

    c.running     = true;
    c.status      = "running";
    c.generated   = 0;
    c.workerToken = wToken;
    c.workers     = [];
    refreshRow(c);
    updateGlobalBtns();
    ensureStatsTimer();

    const url = getBlobUrl();
    let completed = 0;

    for (let id = 0; id < cores; id++) {
      const w = new Worker(url);

      w.onmessage = ev => {
        if (c.workerToken !== wToken) return;
        const d = ev.data || {};

        if (d.type === "batch") {
          c.generated += d.count;
          if (d.lastItem) $liveWallet.value = d.lastItem.hex + " | " + d.lastItem.hash160;
          if (d.matchItem) { handleMatch(c, d.matchItem); return; }
        }

        if (d.type === "done") {
          completed++;
          if (completed >= c.workers.length) {
            c.running = false;
            c.status  = "done";
            refreshRow(c);
            updateGlobalBtns();
            updateStats();
          }
        }

        if (d.type === "error") {
          stopOne(c, "error");
          setStatus(d.message || "Worker error.", "err");
        }
      };

      w.onerror = err => { stopOne(c, "error"); setStatus(err.message || "Worker failed.", "err"); };

      w.postMessage({
        type: "start", id, cores, mode,
        startHex:   c.startNum.toString(16).padStart(64,"0"),
        endHex:     c.endNum.toString(16).padStart(64,"0"),
        target,
        batchLimit: 100000
      });

      c.workers.push(w);
    }
  }

  function handleMatch(srcCluster, matchItem) {
    // Stop every cluster immediately
    for (const c of clusters) {
      if (c.running) {
        c.workers.forEach(w => { try { w.terminate(); } catch(_){} });
        c.workers     = [];
        c.running     = false;
        c.workerToken = null;
        c.status      = "idle";
        refreshRow(c);
      }
    }
    srcCluster.status = "found";
    refreshRow(srcCluster);

    clearInterval(statsTimer); statsTimer = 0;
    updateStats();
    updateGlobalBtns();

    const result = matchItem.hex + " | " + matchItem.hash160;
    $liveWallet.value    = result;
    $matchOut.value      = result;
    $matchSec.style.display = "";
    setStatus("🎉 Match found! All searches stopped.", "ok");
  }

  /* ─── Build Clusters (async, non-blocking) ────────────────────────────── */
  async function buildClusters() {
    if (isBuilding) return;
    try {
      updateCounts();
      const start = normalizeHex($startHex.value, "Hex start");
      const end   = normalizeHex($endHex.value,   "Hex end");
      if (start.number > end.number) throw new Error("Hex start must be ≤ hex end.");

      // Reset everything
      stopAll();
      clusters    = [];
      globalStart = 0;
      if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
      $matchSec.style.display = "none";
      $matchOut.value = "";
      $liveWallet.value = "";
      updateStats();

      const rangeSize = end.number - start.number + 1n;

      // Determine cluster size — auto-scale if too many clusters would result
      let clusterSz = TARGET_CLUSTER_SZ;
      const idealN  = (rangeSize + clusterSz - 1n) / clusterSz;
      if (idealN > BigInt(MAX_CLUSTERS)) {
        clusterSz = (rangeSize + BigInt(MAX_CLUSTERS) - 1n) / BigInt(MAX_CLUSTERS);
      }
      const totalN = Number((rangeSize + clusterSz - 1n) / clusterSz);
      const autoScaled = idealN > BigInt(MAX_CLUSTERS);

      isBuilding = true;
      $buildBtn.disabled    = true;
      $startAllBtn.disabled = true;
      $clusterList.innerHTML = "";
      $clusterInfo.textContent = "Building…";
      setStatus("Building " + totalN.toLocaleString() + " cluster" + (totalN !== 1 ? "s" : "") + "…");

      const token = ++buildToken;
      let current = start.number;
      let idx     = 0;

      // Render in RENDER_CHUNK-sized batches per event-loop tick so the page stays live
      while (current <= end.number) {
        if (token !== buildToken) return; // cancelled by Clear

        const frag = document.createDocumentFragment();
        for (let i = 0; i < RENDER_CHUNK && current <= end.number; i++) {
          const cEnd  = (current + clusterSz - 1n > end.number) ? end.number : current + clusterSz - 1n;
          const c     = {
            id: idx++, startNum: current, endNum: cEnd,
            workers: [], running: false, generated: 0,
            status: "idle", workerToken: null,
            el: null, elSt: null, elGen: null, elStart: null, elStop: null
          };
          clusters.push(c);
          frag.appendChild(makeRow(c));
          current = cEnd + 1n;
        }
        $clusterList.appendChild(frag);
        $clusterInfo.textContent = idx + " / " + totalN + " clusters…";
        await new Promise(r => setTimeout(r, 0)); // yield to browser
      }

      const note = autoScaled
        ? ` (auto-scaled: ~${Number(clusterSz).toLocaleString()} keys/cluster)`
        : ` (~${Number(clusterSz).toLocaleString()} keys/cluster)`;
      $clusterInfo.textContent = totalN.toLocaleString() + " cluster" + (totalN !== 1 ? "s" : "") + " ready." + note;
      $totStat.textContent = String(clusters.length);
      setStatus("Clusters ready. Set target HASH160 and use Start All or individual Start.", "ok");

    } catch(e) {
      setStatus(e.message, "err");
    } finally {
      isBuilding = false;
      $buildBtn.disabled = false;
      updateGlobalBtns();
    }
  }

  /* ─── Event listeners ─────────────────────────────────────────────────── */
  $startHex.addEventListener("input", updateCounts);
  $endHex.addEventListener("input", updateCounts);
  $targetHash.addEventListener("input", () => {
    const v = sanitizeHex($targetHash.value).slice(0,40);
    if ($targetHash.value !== v) $targetHash.value = v;
  });

  $buildBtn.addEventListener("click", buildClusters);

  $clearBtn.addEventListener("click", () => {
    ++buildToken; // cancel in-progress build
    stopAll();
    clusters    = [];
    isBuilding  = false;
    globalStart = 0;
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    $clusterList.innerHTML = "<div class='empty-msg'>No clusters yet. Enter a range and click \"Build Clusters\".</div>";
    $clusterInfo.textContent = "";
    $matchSec.style.display  = "none";
    $matchOut.value          = "";
    $liveWallet.value        = "";
    $buildBtn.disabled       = false;
    updateCounts(); updateStats(); updateGlobalBtns();
    setStatus("Cleared. Enter a hex range.");
  });

  $startAllBtn.addEventListener("click", () => {
    try { normalizeHash160($targetHash.value); }
    catch(e) { setStatus(e.message, "err"); return; }

    // Stagger launches so browser stays responsive
    let delay = 0;
    for (const c of clusters) {
      if (!c.running && c.status !== "found" && c.status !== "done") {
        const ref = c;
        setTimeout(() => { if (!ref.running && ref.status !== "found") startCluster(ref); }, delay);
        delay += START_STAGGER_MS;
      }
    }
    updateGlobalBtns();
    setStatus("All clusters starting…");
  });

  $stopAllBtn.addEventListener("click", () => {
    stopAll("idle");
    setStatus("All stopped.");
  });

  updateCounts(); updateStats(); updateGlobalBtns();

  /* ================================================================
     Worker source — unchanged hot-path logic, embedded as string
     ================================================================ */
  function workerSrc() { return `
"use strict";

/* ── Curve constants ── */
const P  = 0xfffffffffffffffffffffffffffffffffffffffffffffffffffffffefffffc2fn;
const N  = 0xfffffffffffffffffffffffffffffffebaaedce6af48a03bbfd25e8cd0364141n;
const Gx = 0x79be667ef9dcbbac55a06295ce870b07029bfcdb2dce28d959f2815b16f81798n;
const Gy = 0x483ada7726a3c4655da4fbfc0e1108a8fd17b448a68554199c47d08ffb10d4b8n;

/* SHA-256 round constants */
const K256 = new Int32Array([
  0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
  0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
  0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
  0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
  0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
  0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
  0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
